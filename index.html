<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 30px;
            color: #e2e8f0;
            text-align: center;
        }

        h2 {
            margin: 20px 0 10px;
        }

        /* TOP BAR */
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* INPUTS */
        input, textarea {
            width: 100%;
            max-width: 500px;
            padding: 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }

        /* BUTTON */
        button {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            margin: 8px 0;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* TAGS */
        #tagFilter span,
        .tags span {
            display: inline-block;
            background: rgba(99,102,241,0.2);
            padding: 6px 12px;
            margin: 4px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        #tagFilter span.active {
            background: #6366f1;
            color: white;
        }

        /* GRID */
        #notes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* NOTE CARD (FIXED GOD STYLE) */
        .note {
            position: relative;
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            transition: all 0.35s ease;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .note::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            padding: 1px;
            background: linear-gradient(135deg, transparent, #6366f1, transparent);
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: 0;
            transition: 0.4s ease;
        }

        .note:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .note:hover::before {
            opacity: 1;
        }

        .note h3 {
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .note p {
            font-size: 14px;
            color: #cbd5f5;
            margin-bottom: 10px;
        }

        .note small {
            color: #94a3b8;
            font-size: 11px;
        }

        .note .tags span {
            background: rgba(99,102,241,0.2);
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
        }

        .note .tags span:hover {
            background: #6366f1;
            color: white;
        }
    </style>
</head>

<body>

<div id="topBar">
    <h2>Notes App</h2>
    <button onclick="logout()">Logout</button>
</div>

<h2>Create Note</h2>
<input id="title" placeholder="Title"><br>
<textarea id="content" placeholder="Content"></textarea><br>
<input id="tags" placeholder="Tags (comma separated)"><br>
<button onclick="addNote()">Add Note</button>

<h2>Search</h2>
<input type="text" placeholder="Search notes..." oninput="handleSearch(this)">

<h2>Filter by Tag</h2>
<div id="tagFilter"></div>

<h2>All Notes</h2>
<div id="notes"></div>

<script>
/* your JS unchanged */
let allNotes = [];
let activeTag = null;
let searchQuery = "";

async function fetchNotes() {
    const res = await fetch("/notes");

    if (res.status === 401) {
        window.location.href = "/login-page";
        return;
    }

    const data = await res.json();

    allNotes = data.sort(
        (a, b) => new Date(b.created_at) - new Date(a.created_at)
    );

    renderTags();
    applyFilters();
}

function applyFilters() {
    let filtered = [...allNotes];

    if (activeTag) {
        filtered = filtered.filter(n => n.tags.includes(activeTag));
    }

    if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(n =>
            n.title.toLowerCase().includes(q) ||
            n.content.toLowerCase().includes(q)
        );
    }

    displayNotes(filtered);
}

function displayNotes(notes) {
    const container = document.getElementById("notes");
    container.innerHTML = "";

    notes.forEach(n => {
        const div = document.createElement("div");
        div.className = "note";

        div.innerHTML = `
            <h3>${n.title}</h3>
            <p>${n.content}</p>
            <small>${new Date(n.created_at).toLocaleString()}</small>
            <div class="tags">
                ${n.tags.map(t =>
                    `<span onclick="setTag('${t}')">${t}</span>`
                ).join("")}
            </div>
        `;

        container.appendChild(div);
    });
}

function renderTags() {
    const tagSet = new Set();
    allNotes.forEach(n => n.tags.forEach(t => tagSet.add(t)));

    const tagFilter = document.getElementById("tagFilter");
    tagFilter.innerHTML = "";

    const all = document.createElement("span");
    all.textContent = "All";
    all.onclick = () => {
        activeTag = null;
        updateActiveTagUI();
        applyFilters();
    };

    tagFilter.appendChild(all);

    tagSet.forEach(tag => {
        const span = document.createElement("span");
        span.textContent = tag;
        span.onclick = () => setTag(tag);
        tagFilter.appendChild(span);
    });
}

function setTag(tag) {
    activeTag = tag;
    updateActiveTagUI();
    applyFilters();
}

function updateActiveTagUI() {
    document.querySelectorAll("#tagFilter span").forEach(el => {
        el.classList.toggle("active", el.textContent === activeTag);
    });
}

function handleSearch(input) {
    searchQuery = input.value;
    applyFilters();
}

async function addNote() {
    await fetch("/notes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            title: document.getElementById("title").value,
            content: document.getElementById("content").value,
            tags: document.getElementById("tags").value
        })
    });

    fetchNotes();
}

function logout() {
    window.location.href = "/logout";
}

fetchNotes();
</script>

</body>
</html>
