<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 50%, #c7d2fe 100%);
    color: #1e293b;
    overflow: hidden;
    position: relative;
}

/* 🎥 BACKGROUND VIDEO */
#bg-video {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    z-index: -2;
    filter: brightness(1.1) contrast(0.95) saturate(0.8);
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(
        circle at center,
        rgba(255,255,255,0.7),
        rgba(224,231,255,0.85)
    );
    z-index: -1;
}

/* ☀️ DECORATIVE LIGHT ORBS */
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    animation: orbFloat 8s ease-in-out infinite;
}

.orb-1 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, #a5b4fc, #818cf8);
    top: -100px;
    right: -50px;
    animation-delay: 0s;
}

.orb-2 {
    width: 250px;
    height: 250px;
    background: linear-gradient(135deg, #86efac, #4ade80);
    bottom: -80px;
    left: -50px;
    animation-delay: -3s;
}

.orb-3 {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #fcd34d, #fbbf24);
    top: 50%;
    left: 10%;
    animation-delay: -5s;
}

@keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -30px) scale(1.1); }
}

/* ✨ FLOATING PARTICLES - Light Theme */
.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: linear-gradient(135deg, #818cf8, #6366f1);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0.4;
    box-shadow: 0 0 10px rgba(99,102,241,0.3);
}

@keyframes floatUp {
    from {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
    }
    50% {
        opacity: 0.6;
    }
    to {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0;
    }
}

/* 🌟 SPARKLE EFFECT */
.sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
    box-shadow: 0 0 6px #fff, 0 0 12px #a5b4fc;
}

@keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1); }
}

/* LOGIN BOX - Glass Morphism Light */
.login-box {
    width: 380px;
    padding: 40px 35px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    text-align: center;
    animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 
        0 25px 50px rgba(99,102,241,0.15),
        0 10px 20px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.8);
    position: relative;
    z-index: 10;
}

.login-box::before {
    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(135deg, #a5b4fc, #86efac, #fcd34d, #a5b4fc);
    border-radius: 26px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.login-box:hover::before {
    opacity: 0.5;
    animation: borderGlow 3s linear infinite;
}

@keyframes borderGlow {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

@keyframes pop {
    from {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
    }
    to {
        transform: scale(1) translateY(0);
        opacity: 1;
    }
}

h2 {
    margin-bottom: 25px;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #4f46e5, #6366f1, #22c55e);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 3s ease infinite;
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* INPUT WRAPPER */
.input-wrapper {
    position: relative;
    margin: 15px 0;
}

.input-wrapper i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 16px;
    transition: 0.3s;
}

/* INPUTS - Light Theme */
input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: rgba(255,255,255,0.8);
    color: #1e293b;
    font-size: 15px;
    transition: all 0.3s ease;
}

input::placeholder {
    color: #94a3b8;
}

input:focus {
    transform: translateY(-2px);
    border-color: #6366f1;
    box-shadow: 
        0 4px 15px rgba(99,102,241,0.2),
        0 0 0 4px rgba(99,102,241,0.1);
    outline: none;
    background: white;
}

input:focus + i,
.input-wrapper:hover i {
    color: #6366f1;
}

/* BUTTON - Enhanced */
button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    color: white;
    background: linear-gradient(135deg, #6366f1, #4f46e5, #7c3aed);
    background-size: 200% 200%;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
    );
    transition: 0.5s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 
        0 10px 30px rgba(99,102,241,0.4),
        0 5px 15px rgba(79,70,229,0.3);
    background-position: 100% 0;
}

button:hover::before {
    left: 100%;
}

button:active {
    transform: translateY(-1px);
}

/* ERROR */
.error {
    margin-top: 15px;
    padding: 10px;
    color: #dc2626;
    font-size: 13px;
    background: rgba(254,226,226,0.5);
    border-radius: 8px;
    display: none;
}

.error:not(:empty) {
    display: block;
    animation: shake 0.5s ease;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}

/* DIVIDER */
.divider {
    display: flex;
    align-items: center;
    margin: 25px 0 20px;
    color: #94a3b8;
    font-size: 13px;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #cbd5e1, transparent);
}

.divider span {
    padding: 0 15px;
}

/* REGISTER LINK */
.register-link {
    margin-top: 20px;
    color: #64748b;
    font-size: 14px;
}

.register-link a {
    color: #6366f1;
    text-decoration: none;
    font-weight: 600;
    position: relative;
    transition: 0.3s;
}

.register-link a::after {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    transition: width 0.3s ease;
}

.register-link a:hover {
    color: #4f46e5;
}

.register-link a:hover::after {
    width: 100%;
}

/* FLOATING ICONS */
.floating-icon {
    position: absolute;
    font-size: 24px;
    animation: floatIcon 6s ease-in-out infinite;
    opacity: 0.3;
    z-index: 1;
}

@keyframes floatIcon {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
}

/* LOADING STATE */
button.loading {
    pointer-events: none;
    opacity: 0.8;
}

button.loading::after {
    content: "";
    width: 20px;
    height: 20px;
    border: 2px solid transparent;
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    margin-left: 10px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- Decorative Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 🎥 FIXED VIDEO PATH (IMPORTANT) -->
<video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='login.mp4') }}" type="video/mp4">
</video>

<!-- Floating Decorative Icons -->
<div class="floating-icon" style="top: 15%; left: 10%;">🔐</div>
<div class="floating-icon" style="top: 25%; right: 15%; animation-delay: -2s;">✨</div>
<div class="floating-icon" style="bottom: 20%; left: 15%; animation-delay: -4s;">🌟</div>
<div class="floating-icon" style="bottom: 30%; right: 10%; animation-delay: -1s;">💫</div>

<div class="login-box">
    <h2>🚀 Login</h2>

    <div class="input-wrapper">
        <input id="username" placeholder="Username" autocomplete="username">
        <i>👤</i>
    </div>
    
    <div class="input-wrapper">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <i>🔒</i>
    </div>

    <button onclick="login()" id="loginBtn">Login</button>

    <div class="error" id="error"></div>

    <div class="divider"><span>or</span></div>

    <p class="register-link">
        New user? <a href="/register">Create an account</a>
    </p>
</div>

<script>
/* 🌌 Floating Particles - Light colored */
for (let i = 0; i < 20; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (6 + Math.random() * 6) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    p.style.width = (4 + Math.random() * 6) + "px";
    p.style.height = p.style.width;
    document.body.appendChild(p);
}

/* ✨ Sparkles */
for (let i = 0; i < 15; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    s.style.animationDelay = Math.random() * 2 + "s";
    document.body.appendChild(s);
}

/* Enter key support */
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
});

async function login() {
    const btn = document.getElementById('loginBtn');
    btn.classList.add('loading');
    btn.textContent = 'Logging in';
    
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (res.ok) {
        document.body.style.transition = "0.5s";
        document.body.style.opacity = "0";
        document.body.style.transform = "scale(1.05)";
        setTimeout(() => window.location.href = "/", 500);
    } else {
        btn.classList.remove('loading');
        btn.textContent = 'Login';
        error.textContent = data.error || "Login failed";
    }
}
</script>

</body>
</html>
